reformisten_subdoctrine_name: "Reformisten Plan"
reformisten_subdoctrine_desc: "The Reformisten build upon the reforms of Hans von Seeckt and seek to transform the Heer into a professional fighting force. There is no point in holding onto old traditions when the masses can bring even more talent, and technology must be applied for a combined-arms offensive that runs laps around old infantry-based armies."
reformisten_subdoctrine_reformisten_subdoctrine1: "Reformisten Plan 1"
reformisten_subdoctrine_reformisten_subdoctrine2: "Reformisten Plan 2"
reformisten_subdoctrine_reformisten_subdoctrine3: "Reformisten Plan 3"
reformisten_subdoctrine_reformisten_subdoctrine4: "Reformisten Plan 4"
reformisten_subdoctrine_reformisten_subdoctrine5: "Reformisten Plan 5"

fronde_subdoctrine_name: "Die Fronde Plan"
fronde_subdoctrine_desc: "The Die Fronde unites disparate factions which seek a totalitarian transformation of the Heer — from improving the \"psychology\" of the common soldier to total mobilisation of all national resources for war. Technology serves the will of the German people and should be used for unrestrained destruction of the enemy!"
fronde_subdoctrine_fronde_subdoctrine1: "Die Fronde Plan 1"
fronde_subdoctrine_fronde_subdoctrine2: "Die Fronde Plan 2"
fronde_subdoctrine_fronde_subdoctrine3: "Die Fronde Plan 3"
fronde_subdoctrine_fronde_subdoctrine4: "Die Fronde Plan 4"
fronde_subdoctrine_fronde_subdoctrine5: "Die Fronde SCHLEICH-MAXXED MILITARISM (5)"

altgardisten_subdoctrine_name: "Altgardisten Plan"
altgardisten_subdoctrine_desc: "The military establishment of the Heer is certain that our traditional military strategies are adequate and the extreme rhetoric of the Reformisten and Die Fronde would only lead to destructive results. We should adapt to modern technology somewhat, but retain our proven traditional touch."
altgardisten_subdoctrine_altgardisten_subdoctrine1: "Altgardisten Plan 1"
altgardisten_subdoctrine_altgardisten_subdoctrine2: "Altgardisten Plan 2"
altgardisten_subdoctrine_altgardisten_subdoctrine3: "Altgardisten Plan 3"
altgardisten_subdoctrine_altgardisten_subdoctrine4: "Altgardisten Plan 4"
altgardisten_subdoctrine_altgardisten_subdoctrine5: "Altgardisten Plan 5"

 golovin_reform_subdoctrine_name: "Scientific Warfare"
 golovin_reform_subdoctrine_desc: "Nikolay Golovin's 'Neo-Suvorovian' theories have been controversial, many seeing them as being too Prussian-inspired and against the spirit of the army that destroyed the Red Menace. Golovin's thesis is to formulate a 'Russian Auftragstaktik', taking the best lessons from German military thinking."
