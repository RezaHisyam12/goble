democratic_organization_subdoctrine_name: "Democratic Organization"
democratic_organization_subdoctrine_desc: "Democratic decision-making in real-time has the benfits of allowing our troops to decide tactics as realities appear. Our plan is to democratize the military command chain to allow this, and enable the liberation of the common-man soldier."
