golovin_reform_subdoctrine_golovin_reform_subdoctrine4: "Scientific Warfare 4"
golovin_reform_subdoctrine_golovin_reform_subdoctrine5: "Scientific Warfare 5"

 messner_subdoctrine_name: "Spirit of Victory"
 messner_subdoctrine_desc: "What brought the Volunteer Army to the victory? We never lost faith, we never wavered, and our spirit was held high by the righteousness of our cause. This is the quality that Denikin's and Markov's reforms have always sought to maintain - the unwavering, offensive spirit of the Russian soldier."
